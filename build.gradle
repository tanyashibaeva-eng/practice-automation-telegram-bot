plugins {
    id 'java'
    id 'jacoco' // coverage для тестов
    id 'com.github.ksoichiro.console.reporter' version '0.6.3' // для генерации отчета о тестировании в терминал
}

group = 'ru.itmo'
version = '1.0'

repositories {
    mavenCentral()
}

jar {
    doFirst {
        manifest {
            attributes(
                    'Main-Class': 'ru.itmo.Main'
            )
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.release = 19
    options.encoding = 'UTF-8'
}

tasks.jar {
    manifest {
        archiveFileName.set("${project.name}.jar")
    }
}

dependencies {
    implementation("org.telegram:telegrambots:6.9.7.1")
    implementation("org.postgresql:postgresql:42.7.5")

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

jacocoTestReport {
    dependsOn test

    reports {
        xml.required = true
        html.required = true
        csv.required = true
    }
}

jacocoTestCoverageVerification {
    violationRules {
        rule {
            limit {
                minimum = 0.2
            }
        }
    }
}
