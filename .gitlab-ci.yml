stages:
  - build
  - test

build:
  stage: build
  image: gradle:7.4-jdk11
  script:
    - ./gradlew clean build
  artifacts:
    paths:
      - build/libs/*.jar

test:
  stage: test
  image: gradle:7.4-jdk11
  script:
    - ./gradlew clean test jacocoTestReport check
  dependencies:
    - build
  artifacts:
    paths:
      - build/reports/jacoco/test/html/
    expire_in: 1 week

