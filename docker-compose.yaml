services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: practice_bot
#    volumes:
#      - ./src/main/resources/migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    restart: unless-stopped
    networks:
      - practice-bot-network

  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - db
    environment:
      BOT_TOKEN: $BOT_TOKEN
      PG_DSN: $PG_DSN
    restart: unless-stopped
    networks:
      - practice-bot-network

networks:
  practice-bot-network:
    driver: bridge