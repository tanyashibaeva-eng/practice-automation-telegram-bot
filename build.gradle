plugins {
    id 'java'
    id 'jacoco' // coverage для тестов
    id 'com.github.ksoichiro.console.reporter' version '0.6.3'
}

group = 'ru.itmo'
version = '1.0'

repositories {
    mavenCentral()
}

dependencies {
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

test {
    useJUnitPlatform()
}

jacocoTestReport {
    dependsOn test

    reports {
        xml.required=true
        html.required=true
        csv.required=true
    }
}
