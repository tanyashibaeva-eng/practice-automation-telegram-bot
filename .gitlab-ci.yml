stages:
  - build
  - test

build:
  stage: build
  image: openjdk:19-jdk
  script:
    - ./gradlew clean build
  artifacts:
    paths:
      - build/libs/*.jar

test:
  stage: test
  image: openjdk:19-jdk
  script:
    - ./gradlew clean test jacocoTestReport check
  dependencies:
    - build
  artifacts:
    paths:
      - build/reports/jacoco/test/html/
    expire_in: 1 day

coverage:
  stage: test
  image: openjdk:19-jdk
  script:
    - ls -la
  dependencies:
    - test
  only:
    - branches
