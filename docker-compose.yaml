services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: practice_bot
    restart: unless-stopped
    ports:
      - "5555:5432"
    networks:
      - practice-bot-network

  app:
    build:
      context: .
      dockerfile: ./Dockerfile
    depends_on:
      - db
    environment:
      BOT_TOKEN: $BOT_TOKEN
      PG_DSN: $PG_DSN
      INN_CHECK: $INN_CHECK
    restart: unless-stopped
    networks:
      - practice-bot-network

networks:
  practice-bot-network:
    driver: bridge